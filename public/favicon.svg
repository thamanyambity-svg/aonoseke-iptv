<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="gc">
      <circle cx="50" cy="50" r="31.5"/>
    </clipPath>
    <radialGradient id="rg" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a1e00"/>
      <stop offset="100%" stop-color="#0d0900"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="49.5" fill="#0d0a04"/>

  <!-- Gear ring -->
  <circle cx="50" cy="50" r="44" fill="#c9a84c"/>
  <circle cx="50" cy="50" r="37.5" fill="#0d0a04"/>

  <!-- Gear teeth (12) -->
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(0 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(30 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(60 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(90 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(120 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(150 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(180 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(210 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(240 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(270 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(300 50 50)"/>
  <rect x="47" y="3.5" width="6" height="11" rx="1.5" fill="#c9a84c" transform="rotate(330 50 50)"/>

  <!-- Globe fill -->
  <circle cx="50" cy="50" r="31.5" fill="url(#rg)"/>

  <!-- Globe grid -->
  <g clip-path="url(#gc)" stroke="#c9a84c" fill="none">
    <ellipse cx="50" cy="50" rx="31.5" ry="9" stroke-width="0.7" opacity="0.35"/>
    <ellipse cx="50" cy="50" rx="31.5" ry="18.5" stroke-width="0.7" opacity="0.25"/>
    <ellipse cx="50" cy="50" rx="11" ry="31.5" stroke-width="0.7" opacity="0.3"/>
    <ellipse cx="50" cy="50" rx="22" ry="31.5" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- Globe outline -->
  <circle cx="50" cy="50" r="31.5" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>

  <!-- Letter A shadow -->
  <text x="51" y="65" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-weight="900" font-size="47"
    fill="#000" opacity="0.55">A</text>

  <!-- Letter A main -->
  <text x="50" y="64" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-weight="900" font-size="47"
    fill="#c9a84c">A</text>

  <!-- Arrow -->
  <path d="M 19 73 Q 46 38 75 23" stroke="#c9a84c" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <polygon points="75,23 65,22 71,32" fill="#c9a84c"/>
</svg>
